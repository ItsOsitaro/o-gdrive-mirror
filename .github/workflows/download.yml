name: Download Takeout

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create cookies file
        run: |
          echo "${{ secrets.GOOGLE_COOKIES }}" > cookies.txt

      - name: Download Takeout
        run: |
          curl -L \
          -b cookies.txt \
          "https://takeout-download.usercontent.google.com/download/takeout-20260511T200120Z-3-002.zip?j=8ebe3836-7b53-4e23-b77c-6c2c7935d850&i=1&user=578995869144&authuser=0" \
          -o takeout.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: takeout.zip
